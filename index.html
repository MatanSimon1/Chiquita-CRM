<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chiquita CRM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen" style="display:flex">
  <div class="login-wrap">
    <div class="login-logo">
      <img src="logo.png" alt="Chiquita" class="login-logo-img"/>
      <div class="login-brand">Chiquita CRM</div>
    </div>
    <div class="login-card">
      <h1>כניסה למערכת</h1>
      <div class="form-group">
        <label>שם משתמש</label>
        <input type="text" id="login-username" placeholder="הכנס שם משתמש" autocomplete="username"/>
      </div>
      <div class="form-group">
        <label>סיסמא</label>
        <div style="position:relative">
          <input type="password" id="login-password" placeholder="הכנס סיסמא" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()" style="padding-left:38px"/>
          <button type="button" onclick="togglePassVis()" id="pass-eye" style="position:absolute;left:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text3);font-size:16px;padding:0">👁</button>
        </div>
      </div>
      <button class="btn-primary" onclick="doLogin()">כניסה</button>
      <div id="login-error" class="error-msg" style="display:none;">שם משתמש או סיסמא שגויים</div>
    </div>
  </div>
</div>

<!-- CRM -->
<div id="crm-screen" style="display:none">
  <div class="sidebar">
    <!-- Row 1: logo | client name | buttons -->
    <div class="sidebar-top" style="display:flex;align-items:center;gap:6px;margin-bottom:.6rem">
      <img src="logo.png" alt="" class="crm-logo-img"/>
      <div class="sb-client-name" id="s-client-name" style="flex:1;text-align:center;font-size:15px;font-weight:700;color:var(--text)">—</div>
      <button id="theme-toggle" onclick="toggleTheme()" class="btn-logout-small" title="מצב תצוגה" style="font-size:14px">☀️</button>
      <button class="btn-logout-small" onclick="doLogout()" title="התנתק">⏻</button>
    </div>

    <!-- Row 2: tabs -->
    <div class="nav-tabs" style="margin-bottom:.5rem">
      <button class="nav-tab active" onclick="switchTab('leads',this)">לידים</button>
      <button class="nav-tab" onclick="switchTab('analytics',this)">סטטיסטיקה</button>
    </div>

    <div class="s-stats" id="s-stats"></div>

    <div class="fin-section" id="fin-section" style="display:none;">
      <div class="fin-title">פיננסים</div>
      <div class="fin-field">
        <label id="budget-label">תקציב קמפיין (₪)</label>
        <input type="number" id="budget" value="0" oninput="onBudgetChange()"/>
        <div class="fin-hint">לכל חודש בנפרד</div>
      </div>
      <div id="fin-results"></div>
    </div>
  </div>

  <div class="main-area">
    <div id="view-leads">
      <div class="top-bar">
        <div class="filters-row">
          <div class="search-wrap">
            <svg class="search-icon" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <input type="text" id="search" placeholder="חיפוש..." oninput="currentPage=1;renderTable()"/>
          </div>
          <select id="filter-status" onchange="currentPage=1;renderTable()">
            <option value="">כל הסטטוסים</option>
            <option>ליד חדש</option>
            <option>ביקש פרטים נוספים בוואטסאפ</option>
            <option>פולואפ</option>
            <option>לא רלוונטי</option>
            <option>נמכר</option>
          </select>
          <button class="btn-add" onclick="openModal()">+ הוסף ליד</button>
        </div>
      </div>

      <div class="table-wrap desktop-only">
        <table>
          <thead><tr>
            <th onclick="sortBy('date')">תאריך ↕</th>
            <th onclick="sortBy('name')">שם ↕</th>
            <th>טלפון</th>
            <th onclick="sortBy('status')">סטטוס ↕</th>
            <th>הערות</th>
            <th>סכום</th>
            <th>מיקום / עניין</th>
            <th>איך קנה</th>
            <th></th>
          </tr></thead>
          <tbody id="table-body"></tbody>
        </table>
        <div id="empty-state" class="empty-state" style="display:none;"><div>◎</div><div>לא נמצאו לידים</div></div>
      </div>

      <div class="cards-wrap mobile-only" id="cards-body"></div>

      <div class="table-footer">
        <span id="row-count"></span>
        <div id="sync-status" class="sync-status"></div>
      </div>
      <div class="page-footer">מופעל על ידי <strong>MetricMinds</strong></div>
    </div>

    <div id="view-analytics" style="display:none;">
      <div id="kpi-row" class="kpi-row"></div>
      <div class="analytics-card" style="margin-bottom:12px;">
        <div class="analytics-card-title">התפלגות סטטוסים</div>
        <div id="status-bars"></div>
      </div>
      <div class="analytics-card">
        <div class="analytics-card-title">איך קנו (נמכרו)</div>
        <div id="ad-bars"></div>
      </div>
      <div class="page-footer">מופעל על ידי <strong>MetricMinds</strong></div>
    </div>
  </div>


<!-- INLINE EDIT -->
<div class="modal-overlay" id="inline-edit-modal" onclick="if(event.target===this)closeInlineEdit()">
  <div class="modal">
    <div class="modal-header">
      <h2>עריכת ליד</h2>
      <button class="modal-close" onclick="closeInlineEdit()">✕</button>
    </div>
    <div class="modal-body">
      <div class="ie-header-info">
        <div class="ie-lead-name" id="ie-name-val"></div>
        <div class="ie-meta"><span id="ie-date"></span></div>
      </div>
      <div class="ie-readonly-grid">
        <div class="ie-readonly-item"><div class="ie-readonly-label">מיקום / עניין</div><div class="ie-readonly-val" id="ie-campaign"></div></div>
      </div>
      <div class="ie-divider">ניתן לעריכה</div>
      <div class="form-row">
        <div class="form-group"><label>שם</label><input type="text" id="ie-name"/></div>
        <div class="form-group"><label>טלפון</label><input type="tel" id="ie-phone"/></div>
      </div>
      <div class="form-group"><label>סטטוס</label>
        <div class="status-pills" id="ie-status-pills"></div>
      </div>
      <div class="form-group"><label>הערות</label><textarea id="ie-notes"></textarea></div>
      <div class="form-group" id="ie-income-group" style="display:none;"><label>סכום העסקה (₪)</label><input type="text" id="ie-income" placeholder="2500"/></div>
      <div class="form-group"><label>איך קנה</label>
        <select id="ie-ad">
          <option value="">-- בחר --</option>
          <option value="דרך לינק באשראי">דרך לינק באשראי</option>
          <option value="העברה בקאיה">העברה בקאיה</option>
          <option value="רכישה באתר">רכישה באתר</option>
          <option value="מזומן">מזומן</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-primary" id="ie-save-btn" onclick="saveInlineEdit()" style="width:auto;padding:8px 20px;margin:0">שמור שינויים</button>
      <button class="btn-cancel" onclick="closeInlineEdit()">ביטול</button>
    </div>
  </div>
</div>

<!-- ADD LEAD -->
<div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <h2>הוסף ליד חדש</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group"><label>תאריך</label><input type="date" id="f-date"/></div>
        <div class="form-group"><label>מיקום / עניין</label><input type="text" id="f-campaign"/></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>שם מלא *</label><input type="text" id="f-name"/></div>
        <div class="form-group"><label>טלפון *</label><input type="tel" id="f-phone"/></div>
      </div>
      <div class="form-group"><label>סטטוס</label>
        <div class="status-pills">
          <button class="pill active" data-val="ליד חדש" onclick="selectStatus(this)">ליד חדש</button>
          <button class="pill" data-val="ביקש פרטים נוספים בוואטסאפ" onclick="selectStatus(this)">ביקש פרטים בווצאפ</button>
          <button class="pill" data-val="פולואפ" onclick="selectStatus(this)">פולואפ</button>
          <button class="pill" data-val="לא רלוונטי" onclick="selectStatus(this)">לא רלוונטי</button>
          <button class="pill" data-val="נמכר" onclick="selectStatus(this)">נמכר ✓</button>
        </div>
      </div>
      <div class="form-group"><label>הערות</label><textarea id="f-notes"></textarea></div>
      <div class="form-row">
        <div class="form-group"><label>סכום העסקה (₪)</label><input type="text" id="f-income" placeholder="2500"/></div>
        <div class="form-group"><label>איך קנה</label>
          <select id="f-ad">
            <option value="">-- בחר --</option>
            <option value="דרך לינק באשראי">דרך לינק באשראי</option>
            <option value="העברה בקאיה">העברה בקאיה</option>
            <option value="רכישה באתר">רכישה באתר</option>
            <option value="מזומן">מזומן</option>
          </select>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-primary" onclick="saveLead()" style="width:auto;padding:8px 20px;margin:0"><span>שמור לגיליון</span></button>
      <button class="btn-cancel" onclick="closeModal()">ביטול</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="users.js"></script>
<script src="app.js"></script>
</body>
</html>
